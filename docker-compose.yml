services:
  download-model:
    image: curlimages/curl:latest
    container_name: techmind-download-model
    volumes:
      - ./docker/oracle/onnx:/models
      - ./docker/oracle/scripts/download-model.sh:/download-model.sh:ro
    command: sh /download-model.sh

  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: techmind-oracle-db
    depends_on:
      download-model:
        condition: service_completed_successfully
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: ${ORACLE_SYS_PASSWORD:-TechmindSys123}
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./docker/oracle/startup:/opt/oracle/scripts/startup:ro
      - ./docker/oracle/onnx:/opt/oracle/onnx:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'SELECT 1 FROM dual;' | sqlplus -s system/${ORACLE_SYS_PASSWORD:-TechmindSys123}@//localhost:1521/FREEPDB1 >/dev/null"
       ]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 5m
    
  backend:
    build: ./backend
    container_name: techmind-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      ORACLE_DATASOURCE_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      ORACLE_DB_USERNAME: ${ORACLE_DB_USERNAME:-TECHMIND_APP}
      ORACLE_DB_PASSWORD: ${ORACLE_DB_PASSWORD:-TechmindApp123}
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: techmind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  oracle-data: